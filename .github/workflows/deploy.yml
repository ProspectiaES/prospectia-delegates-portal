name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs:     GH_TOKEN
          script:   bash /var/www/portal/scripts/update-portal.sh
          timeout:  300s
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
